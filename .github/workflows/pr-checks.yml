name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check lock file is up to date
        run: |
          npm install --package-lock-only
          if ! git diff --exit-code package-lock.json; then
            echo "::error::package-lock.json is out of date. Run 'npm install --package-lock-only' and commit the result."
            exit 1
          fi

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
